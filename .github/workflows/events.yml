name: Tibia Event Tracker

on:
  schedule:
    # Runs every day at 09:10 AM BST (08:10 AM UTC)
    # This aligns with the post-Server Save window in the UK.
    - cron: '10 08 * * *'
  workflow_dispatch: # Allows manual execution for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # BeautifulSoup4 is required for parsing the proxy's HTML output
          pip install requests beautifulsoup4 playwright

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Browsers
        # Only runs if the cache was not found
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install firefox --with-deps

      - name: Run Event Scraper
        env:
          # CRITICAL: These map your GitHub Secrets to the Python script
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_BRIDGE_URL: ${{ secrets.GOOGLE_BRIDGE_URL }}
        run: python events.py
