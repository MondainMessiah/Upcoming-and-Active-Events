name: Tibia Event Tracker

on:
  schedule:
    # Runs every day at 10:30 AM UTC (shortly after Server Save)
    - cron: '10 09 * * *'
  workflow_dispatch: # Allows you to run it manually by clicking a button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Browsers
        # Only downloads if the cache wasn't found
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install firefox --with-deps

      - name: Run Event Scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python events.py
