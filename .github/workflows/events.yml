name: Tibia Event Tracker

on:
  schedule:
    # Runs every day at 09:10 AM BST (08:10 AM UTC)
    # This aligns with the post-Server Save window in the UK.
    - cron: '10 08 * * *'
  workflow_dispatch: # Allows manual execution for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up runs by caching your libraries

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # We only need these two for the current logic
          pip install requests beautifulsoup4

      - name: Run Event Scraper
        env:
          # CRITICAL: These map your GitHub Secrets to the Python script
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_BRIDGE_URL: ${{ secrets.GOOGLE_BRIDGE_URL }}
        run: python events.py
