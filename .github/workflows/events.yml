name: Tibia Event Tracker

on:
  schedule:
    - cron: '10 08 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies for Fake Monitor
        # This installs Xvfb, allowing the browser to draw visuals on a server
        run: sudo apt-get install -y xvfb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install playwright playwright-stealth requests
          python -m playwright install chromium --with-deps

      - name: Run Event Scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # xvfb-run executes the script inside the fake monitor environment
        run: xvfb-run python events.py
