name: Tibia Event Tracker

on:
  schedule:
    # Runs every day at 09:10 AM BST (08:10 AM UTC)
    # This is shortly after the 09:00 AM BST Server Save.
    - cron: '10 08 * * *'
  workflow_dispatch: # Allows you to run it manually via the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added BeautifulSoup4 for parsing the official calendar HTML
          pip install requests beautifulsoup4 playwright

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright Browsers
        # Downloads the Firefox engine only if the cache is missing
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install firefox --with-deps

      - name: Run Event Scraper
        env:
          # Your Discord Webhook for notifications
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Your Google Apps Script proxy to bypass Tibia.com security
          GOOGLE_BRIDGE_URL: ${{ secrets.GOOGLE_BRIDGE_URL }}
        run: python events.py
