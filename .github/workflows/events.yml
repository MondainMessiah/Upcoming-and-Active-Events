name: Tibia Event Tracker

on:
  schedule:
    # Runs every day at 09:10 AM BST (08:10 AM UTC)
    - cron: '10 08 * * *'
  workflow_dispatch: # Allows manual execution for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # This tries to install from your file first
          pip install -r requirements.txt || true
          
          # BULLETPROOF FALLBACK: Manually forces the correct tools to install
          pip install requests playwright

      - name: Install Playwright Browsers
        # This downloads the hidden Chromium browser so the script can "see" the table
        run: python -m playwright install chromium --with-deps

      - name: Run Event Scraper
        env:
          # CRITICAL: These map your GitHub Secrets to the Python script
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_BRIDGE_URL: ${{ secrets.GOOGLE_BRIDGE_URL }}
        run: python events.py
